function gr(p,sc,s){var d=gs(p,s);if(!d)return -1;sc=Math.max(0,Math.min(750,Math.round(sc)));for(var i=0;i<d.length;i++)if(d[i][0]<=sc)return d[i][1];return d.length?d[d.length-1][1]:-1}
function gd(p,sc,s){
  var d=gs(p,s);if(!d)return null;sc=Math.max(0,Math.min(750,Math.round(sc)));
  for(var i=0;i<d.length;i++){if(d[i][0]===sc){var pv=i>0?d[i-1]:null;return {score:sc,cnt:pv?d[i][1]-pv[1]:d[i][1],cum:d[i][1]}}}
  for(var i=0;i<d.length;i++){if(d[i][0]<sc){var pv=i>0?d[i-1]:null;return {score:sc,cnt:pv?Math.round((d[i][1]-pv[1])/2):d[i][1],cum:d[i][1]}}}
  return null
}

// Starfield - enhanced with deep cosmic sparkle effect;

(function(){
  var c=document.getElementById("starfield"),ctx=c.getContext('2d'),s=[],sh=[],W,H;
  var colors=[
    [180,200,255],[200,180,255],[220,200,255],[160,180,255],[210,190,255],[230,210,255],[255,230,220],[255,220,200]
  ];
  function sz(){W=c.width=innerWidth;H=c.height=innerHeight}
  addEventListener('resize',sz);sz();
  // Layer 1: Tiny distant stars (many, slow, blue-ish)
  for(var i=0;i<300;i++){
    var cl=colors[Math.floor(Math.random()*6)];
    s.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*0.7+0.15,a:Math.random()*0.5+0.25,sp:Math.random()*0.08+0.01,tw:Math.random()*0.015+0.002,ph:Math.random()*Math.PI*2,cl:cl,ly:1});
  }
  // Layer 2: Medium stars (purple-white, moderate speed)
  for(var i=0;i<80;i++){
    var cl=colors[Math.floor(Math.random()*8)];
    s.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.0+0.5,a:Math.random()*0.5+0.35,sp:Math.random()*0.12+0.02,tw:Math.random()*0.025+0.005,ph:Math.random()*Math.PI*2,cl:cl,ly:2});
  }
  // Layer 3: Large bright stars (warm white, strong glow, slow)
  for(var i=0;i<25;i++){
    var cl=colors[Math.floor(Math.random()*3)+5];
    s.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+1.0,a:Math.random()*0.4+0.5,sp:Math.random()*0.05+0.005,tw:Math.random()*0.008+0.002,ph:Math.random()*Math.PI*2,cl:cl,ly:3});
  }
  // Add shooting stars periodically
  var shootingTimer=0;
  function addShootingStar(){
    sh.push({x:Math.random()*W*1.2-0.1*W,y:Math.random()*H*0.35,l:Math.random()*100+50,sp:Math.random()*7+3,ang:Math.PI/4+Math.random()*0.3,a:1,cl:colors[Math.floor(Math.random()*5)]});
  }
  function dr(){
    ctx.clearRect(0,0,W,H);var t=Date.now()/1000;
    s.forEach(function(st){
      st.y-=st.sp;if(st.y<-5){st.y=H+5;st.x=Math.random()*W};
      var twinkle=0.65+0.35*Math.sin(t*st.tw+st.ph);
      var al=st.a*twinkle;var r=st.r;
      if(st.ly===3)r=st.r*(0.85+0.15*Math.sin(t*st.tw*0.7+st.ph));
      var col=st.cl;
      if(r>1.0){
        ctx.beginPath();ctx.arc(st.x,st.y,r*4,0,Math.PI*2);
        ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(al*0.04)+')';ctx.fill();
        ctx.beginPath();ctx.arc(st.x,st.y,r*2.2,0,Math.PI*2);
        ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(al*0.12)+')';ctx.fill();
      }else if(r>0.5){
        ctx.beginPath();ctx.arc(st.x,st.y,r*2.5,0,Math.PI*2);
        ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(al*0.05)+')';ctx.fill();
      }
      ctx.beginPath();ctx.arc(st.x,st.y,r,0,Math.PI*2);
      ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+al+')';ctx.fill();
      if(st.ly===3&&al>0.6){
        ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(al*0.12)+')';ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(st.x-r*2.5,st.y);ctx.lineTo(st.x+r*2.5,st.y);ctx.stroke();
        ctx.beginPath();ctx.moveTo(st.x,st.y-r*2.5);ctx.lineTo(st.x,st.y+r*2.5);ctx.stroke();
      }
    });
    shootingTimer++;
    if(shootingTimer>150+Math.floor(Math.random()*100)){shootingTimer=0;if(sh.length<3)addShootingStar();}
    for(var i=sh.length-1;i>=0;i--){
      var star=sh[i];
      star.x+=Math.cos(star.ang)*star.sp;star.y+=Math.sin(star.ang)*star.sp;
      star.a-=0.007;
      if(star.a<=0||star.x>W+50||star.y>H+50){sh.splice(i,1);continue;}
      var tailLen=star.l*star.a;
      var g=ctx.createLinearGradient(star.x,star.y,star.x-Math.cos(star.ang)*tailLen,star.y-Math.sin(star.ang)*tailLen);
      g.addColorStop(0,'rgba('+star.cl[0]+','+star.cl[1]+','+star.cl[2]+','+(star.a*0.8)+')');
      g.addColorStop(1,'rgba('+star.cl[0]+','+star.cl[1]+','+star.cl[2]+',0)');
      ctx.beginPath();ctx.moveTo(star.x,star.y);
      ctx.lineTo(star.x-Math.cos(star.ang)*tailLen,star.y-Math.sin(star.ang)*tailLen);
      ctx.strokeStyle=g;ctx.lineWidth=1.5*star.a+0.5;ctx.stroke();
      ctx.beginPath();ctx.arc(star.x,star.y,2.5*star.a,0,Math.PI*2);
      ctx.fillStyle='rgba('+star.cl[0]+','+star.cl[1]+','+star.cl[2]+','+(star.a*0.5)+')';ctx.fill();
    }
    requestAnimationFrame(dr)}
  dr()
})();

async function start(){
  var p=document.getElementById('province').value;
  var sc=parseInt(document.getElementById('score').value);
  var subj=gsubj();var s2=ss2();
  if(!p){toast('请选择省份');return}

  if(subj==='combined'){toast('请选择首选科目（物理/历史）');return}
  if(s2.length!==2){toast('请选择两门再选科目');return}

  document.getElementById('loadingOverlay').style.display='flex';

  var rdata=null;var rank=0;
  // Try gaokao-pro API (official data from gaokao.cn/eol.cn/省考试院)
  try{
    var pc=provCode(p);
    // Map subject to track name for API
    var trackName=subj==='物理'?'physics':'history';
    // Get rank from API 一分一段表
    var rr=await api('rank',{province:pc,score:sc,year:2026,track:trackName});
    if(rr&&typeof rr.rank==='number'){
      rank=rr.rank;
    }
    // Get school recommendations from API
    var rd=await api('recommend',{score:sc,province:pc,subjects:[subj].concat(s2),limit:50});
    if(rd&&rd.buckets){
      var ipS=[],opS=[];
      ['冲','稳','保'].forEach(function(tier){
        var schools=rd.buckets[tier]||[];
        schools.forEach(function(s){
          var inProv=s.province===p.replace('省','').replace('市','');
          var prob;
          if(tier==='保')prob=85+Math.round(Math.random()*13);
          else if(tier==='稳')prob=60+Math.round(Math.random()*18);
          else prob=30+Math.round(Math.random()*22);
          var school={
            schoolId:s.schoolId,name:s.name,
            levelTag:s.is985?'985':s.is211?'211':s.dualClass?'双一流':'普通',
            city:s.city,prov:s.province,inProv:inProv,prob:prob,tier:tier,
            baselineMinScore:s.baselineMinScore,delta:s.delta
          };
          if(inProv)ipS.push(school);else opS.push(school);
        });
      });
      var finalSchools=[];
      function pickN(arr,n){return arr.slice(0,n)}
      pickN(ipS.filter(function(s){return s.tier==='冲'}),2).concat(pickN(opS.filter(function(s){return s.tier==='冲'}),5)).slice(0,5).forEach(function(s){finalSchools.push(s)});
      pickN(ipS.filter(function(s){return s.tier==='稳'}),3).concat(pickN(opS.filter(function(s){return s.tier==='稳'}),10)).slice(0,10).forEach(function(s){finalSchools.push(s)});
      pickN(ipS.filter(function(s){return s.tier==='保'}),2).concat(pickN(opS.filter(function(s){return s.tier==='保'}),5)).slice(0,5).forEach(function(s){finalSchools.push(s)});
      var ipFinal=[],opFinal=[];
      finalSchools.forEach(function(s){if(s.inProv)ipFinal.push(s);else opFinal.push(s)});
      rdata={schools:finalSchools,inProvSchools:ipFinal,outProvSchools:opFinal,userRank:rank,fromAPI:true};
    }
  }catch(e){}

  // Fallback: use local data if API failed
  if(!rdata||!rdata.schools||!rdata.schools.length){
    if(rank<=0)rank=gr(p,sc,subj);
    if(rank<=0){rank=gr(p,sc,'combined');if(rank<=0){document.getElementById('loadingOverlay').style.display='none';toast('暂无该科目排名数据');return}}
    rdata=localRec(p,sc,subj);
    if(rdata)rdata.userRank=rank;
  }

  document.getElementById('loadingOverlay').style.display='none';
  if(!rdata||!rdata.schools||!rdata.schools.length){toast('分析失败，请确认数据完整');return}

  document.getElementById('formCard').style.display='none';
  document.querySelector('.query-btn').style.display='none';
  document.getElementById('resultPage').style.display='block';
  drawChart(p,sc,subj,rank);
  renderR(p,sc,subj,rdata,rank);
  renderPersonality();
  setTimeout(function(){document.getElementById('resultPage').scrollIntoView({behavior:'smooth',block:'start'})},100);
}

function drawChart(prov,score,subj,rank){
  var raw=gs(prov,subj);if(!raw||raw.length<5){
    document.getElementById("chartWrap").innerHTML+="<div style=\"padding:40px;text-align:center;color:#9080a8\">暂无该科目一分一段数据</div>";
    return;
  }
  var cv=document.getElementById("chartCanvas");
  var rect=cv.parentElement.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  var W=rect.width*dpr,H=360*dpr;
  cv.width=Math.round(W);cv.height=Math.round(H);
  cv.style.width=rect.width+"px";cv.style.height="360px";
  var ctx=cv.getContext("2d");
  var pad={t:28,r:16,b:48,l:56},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  var d=raw;
  var xMin=d[d.length-1][0],xMax=d[0][0];
  var yMin=0,yMax=d[0][1]*1.12;
  if(yMax<=0){yMax=1000}
  var pts=[];
  for(var i=0;i<d.length;i++){
    var x=pad.l+cw*(xMax-d[i][0])/(xMax-xMin);
    var y=pad.t+ch*(1-(d[i][1]-yMin)/(yMax-yMin));
    pts.push({x:x,y:y});
  }
  if(pts.length<2)return;
  function getCP(pts,i){
    var p0=pts[Math.max(0,i-1)];var p1=pts[i];var p2=pts[Math.min(pts.length-1,i+1)];var p3=pts[Math.min(pts.length-1,i+2)];
    var t=0.18;
    return {cp1x:p1.x+(p2.x-p0.x)*t,cp1y:p1.y+(p2.y-p0.y)*t,cp2x:p2.x-(p3.x-p1.x)*t,cp2y:p2.y-(p3.y-p1.y)*t};
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle="rgba(180,160,255,0.05)";ctx.lineWidth=1;
    for(var i=0;i<=5;i++){
      var y=pad.t+ch*i/5;
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
      var v=Math.round(yMax-(yMax-yMin)*i/5);
      ctx.fillStyle="rgba(200,190,255,0.25)";ctx.font=(10*dpr)+"px sans-serif";
      ctx.textAlign="right";ctx.fillText(fn(v),pad.l-6*dpr,y+4*dpr);
    }
    var xLabels=10;
    for(var i=0;i<=xLabels;i++){
      var x=pad.l+cw*i/xLabels;
      ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+ch);ctx.stroke();
      var v=Math.round(xMax-(xMax-xMin)*i/xLabels);
      ctx.fillStyle="rgba(200,190,255,0.2)";ctx.font=(10*dpr)+"px sans-serif";
      ctx.textAlign="center";ctx.fillText(v,x,pad.t+ch+16*dpr);
    }
    ctx.fillStyle="rgba(200,190,255,0.15)";ctx.font=(9*dpr)+"px sans-serif";
    ctx.textAlign="center";ctx.fillText("分数",pad.l+cw/2,pad.t+ch+36*dpr);
    ctx.save();ctx.translate(10*dpr,pad.t+ch/2);ctx.rotate(-Math.PI/2);
    ctx.fillText("累计人数",0,0);ctx.restore();
    var grd=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
    grd.addColorStop(0,"rgba(140,80,255,0.10)");grd.addColorStop(0.4,"rgba(6,182,212,0.05)");grd.addColorStop(1,"rgba(140,80,255,0.01)");
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pad.t+ch);
    for(var i=0;i<pts.length;i++){
      if(i===0){ctx.lineTo(pts[i].x,pts[i].y)}
      else{var cp=getCP(pts,i-1);ctx.bezierCurveTo(cp.cp1x,cp.cp1y,cp.cp2x,cp.cp2y,pts[i].x,pts[i].y)}
    }
    ctx.lineTo(pts[pts.length-1].x,pad.t+ch);ctx.closePath();ctx.fillStyle=grd;ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(var i=1;i<pts.length;i++){var cp=getCP(pts,i-1);ctx.bezierCurveTo(cp.cp1x,cp.cp1y,cp.cp2x,cp.cp2y,pts[i].x,pts[i].y)}
    ctx.strokeStyle="rgba(140,80,255,0.15)";ctx.lineWidth=8*dpr;ctx.lineCap="round";ctx.stroke();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(var i=1;i<pts.length;i++){var cp=getCP(pts,i-1);ctx.bezierCurveTo(cp.cp1x,cp.cp1y,cp.cp2x,cp.cp2y,pts[i].x,pts[i].y)}
    var lg=ctx.createLinearGradient(0,0,W,0);
    lg.addColorStop(0,"#a78bfa");lg.addColorStop(0.5,"#60a5fa");lg.addColorStop(1,"#22d3ee");
    ctx.strokeStyle=lg;ctx.lineWidth=2.5*dpr;ctx.lineCap="round";ctx.stroke();
    if(score>0){
      var ux=pad.l+cw*(xMax-parseInt(score))/(xMax-xMin);
      var usl=document.getElementById("usl");usl.style.display="block";usl.style.left=(ux/dpr)+"px";usl.style.height=(ch/dpr)+"px";usl.style.top=(pad.t/dpr)+"px";
    }
  }
  draw();
  var tip=document.getElementById("tip");
  cv.onmousemove=function(e){
    var r=cv.getBoundingClientRect();
    var mx=(e.clientX-r.left)*dpr,my=(e.clientY-r.top)*dpr;
    var scX=Math.round(xMax-(mx-pad.l)*(xMax-xMin)/cw);
    scX=Math.max(xMin,Math.min(xMax,scX));
    var dt=gd(prov,scX,subj);if(!dt)return;
    tip.innerHTML="<div class=\"tl\"><span class=\"ll\">分数</span><span class=\"vl\">"+dt.score+"</span></div><div class=\"tl\"><span class=\"ll\">同分人数</span><span class=\"vl\">"+fn(dt.cnt)+"</span></div><div class=\"tl\"><span class=\"ll\">累计排名</span><span class=\"vl\">"+fn(dt.cum)+"</span></div>";
    var tx=Math.max(10,Math.min(r.width-160,mx/dpr+14));var ty=Math.max(10,my/dpr-70);
    tip.style.left=tx+"px";tip.style.top=ty+"px";tip.style.display="block";
  };
  cv.onmouseleave=function(){tip.style.display="none"};
}





function localRec(province,score,subject){
  var sd=window.SCHOOL_DATA;
  if(!sd||Object.keys(sd).length===0){return null}
  var ur=gr(province,score,subject);
  if(ur<=0){ur=gr(province,score,"combined");if(ur<=0)return null}
  var upc=province.replace("省","").replace("市","");
  var eligible=[];
  Object.keys(sd).forEach(function(sch){
    var data=sd[sch];if(!data)return;
    var subs=data.subjects||[],ok=false;
    for(var i=0;i<subs.length;i++){if(subs[i]===subject||subs[i]==="combined"){ok=true;break}}
    if(!ok)return;
    var city=data.city||"";
    var inProv=city===upc;
    var majors=data.majors||{},mk=Object.keys(majors);
    if(!mk.length)return;
    var bMin=999999,bAvg=999999;
    mk.forEach(function(m){
      var mr=majors[m];
      if(mr.minRank&&mr.minRank<bMin)bMin=mr.minRank;
      if(mr.avgRank&&mr.avgRank<bAvg)bAvg=mr.avgRank
    });
    if(bMin>=999999)return;
    var prob,tier;
    if(ur <= bAvg){prob=85+13*Math.random();tier="保"}
    else if(ur <= bMin){prob=60+18*Math.random();tier="稳"}
    else{prob=30+22*Math.random();tier="冲"}
    prob=Math.round(prob);
    eligible.push({name:sch,subject:subject,city:city,level:data.level||"普通",inProv:inProv,prob:prob,minRank:bMin,avgRank:bAvg,tier:tier,majors:majors});
  });
  if(!eligible.length)return null;
  eligible.sort(function(a,b){if(a.inProv!==b.inProv)return a.inProv?-1:1;return a.prob-b.prob});
  function pick(arr,cnt){

function renderMajors(container,majorList,score,subject){
  var userScore=parseInt(score)||0;
  // Filter by subject track: type 2074=历史, 2073=物理
  var trackCode=subject==='物理'?'2073':'2074';
  var filtered=majorList.filter(function(m){return String(m.type)===trackCode||!m.type});
  // Filter out 专项计划 batches (keep 普通批)
  filtered=filtered.filter(function(m){return m.local_batch_name&&(m.local_batch_name.indexOf('普通')>=0||m.local_batch_name.indexOf('本科')>=0)||!m.local_batch_name});
  // Deduplicate by sp_name (keep lowest min_section)
  var seen={};
  filtered=filtered.filter(function(m){
    var key=m.sp_name||m.spname||'unknown';
    if(seen[key])return false;
    seen[key]=true;return true;
  });
  filtered.sort(function(a,b){return (parseInt(a.min_section)||999999)-(parseInt(b.min_section)||999999)});
  
  if(!filtered.length){
    container.innerHTML='<div style="text-align:center;padding:16px;color:#9080a8;font-size:.78rem">暂无该科目招生专业数据</div>';
    return;
  }
  
  var html='<table style="width:100%;border-collapse:collapse;font-size:.75rem">';
  html+='<tr style="border-bottom:1px solid rgba(180,160,255,0.1)"><th style="padding:6px 5px;text-align:left;color:#9080b8;font-weight:600">专业名称</th><th style="padding:6px 5px;text-align:right;color:#9080b8;font-weight:600">最低分</th><th style="padding:6px 5px;text-align:right;color:#9080b8;font-weight:600">最低位次</th><th style="padding:6px 5px;text-align:right;color:#9080b8;font-weight:600">平均分</th></tr>';
  
  var prevRank=0;
  filtered.forEach(function(m,i){
    var mn=m.sp_name||m.name||'未知专业';
    var ms=m.min||'-';
    var mr=parseInt(m.min_section)||'-';
    var ma=m.average||'-';
    var rankDiff='';
    if(typeof mr==='number'&&prevRank>0&&mr!==prevRank){
      rankDiff=' <span style="color:#605080;font-size:.68rem">('+fn(prevRank-mr)+')</span>';
    }
    if(typeof mr==='number')prevRank=mr;
    // Highlight if user score is above/below
    var scoreColor='#d0c0e8';
    if(typeof ms==='number'&&userScore>0){
      if(userScore>=ms)scoreColor='#60d0a0';
      else if(userScore>=ms-5)scoreColor='#f0c060';
      else scoreColor='#f08090';
    }
    html+='<tr style="border-bottom:1px solid rgba(180,160,255,0.03)"><td style="padding:5px 5px;color:'+scoreColor+'">'+mn+'</td><td style="padding:5px 5px;text-align:right;color:#fff">'+ms+'</td><td style="padding:5px 5px;text-align:right;color:#a78bfa">'+fn(mr)+'</td><td style="padding:5px 5px;text-align:right;color:#b0a0c8">'+ma+'</td></tr>';
  });
  html+='</table>';
  // Show score range summary
  var minScore=999, maxScore=0, minRank2=999999, maxRank2=0;
  filtered.forEach(function(m){
    var s=parseInt(m.min)||0;if(s&&s<minScore)minScore=s;if(s&&s>maxScore)maxScore=s;
    var r=parseInt(m.min_section)||0;if(r&&r<minRank2)minRank2=r;if(r&&r>maxRank2)maxRank2=r;
  });
  if(maxScore>0){
    var summary='<div style="padding:8px 5px 4px;font-size:.72rem;color:#9080a8;border-top:1px solid rgba(180,160,255,0.06);margin-top:4px">';
    summary+='分数范围: '+minScore+'~'+maxScore+'分';
    if(maxRank2>0)summary+='  位次范围: '+fn(minRank2)+'~'+fn(maxRank2);
    summary+='</div>';
    html+=summary;
  }
  container.innerHTML=html;
}

// 获取用户选择的MBTI字母（如果有）
function getSelectedMbtiCode() {
  var letters = ['','','',''];
  for (var i = 1; i <= 4; i++) {
    var sel = document.querySelector('input[name="mbti' + i + '"]:checked');
    if (sel) letters[i-1] = sel.value;
  }
  if (letters[0] && letters[1] && letters[2] && letters[3]) {
    return letters.join('');
  }
  return null;
}
getPersonality=function(subj,score,interests,s2,gender,province){
    var tI=["计算机","智能","电气","自动化","机械"];
    var hI=["中文","财经","法学"];
    var tC=interests.filter(function(i){return tI.indexOf(i)>=0;}).length;
    var hC=interests.filter(function(i){return hI.indexOf(i)>=0;}).length;
    var base=subj==="物理"?(tC*3-hC+2):(hC*2-tC+6);
    if(score>=650)base+=3;else if(score>=600)base+=1;else if(score<=450)base-=2;
    if(score>=620&&subj!=="物理")base+=2;
    if(gender==="女")base+=2;else if(gender==="男")base+=1;
    var pO=0;for(var i=0;i<province.length;i++)pO+=province.charCodeAt(i);
    return pd[Math.abs(base+pO)%16];
  };

  window.renderPersonality=function(){
    var s=gsubj();
    if(s==="combined"){document.getElementById("perContent").innerHTML="<div style=\"text-align:center;padding:20px 0;color:#b0a0c8;font-size:.85rem\">\u8bf7\u5148\u9009\u62e9\u9996\u9009\u79d1\u76ee</div>";return;}
    var sc=parseInt(document.getElementById("score").value)||0;
    var s2=ss2();var its=[];
    document.querySelectorAll("#interests input:checked").forEach(function(e){its.push(e.value);});
    var ge=(document.querySelector("input[name=\"gender\"]:checked")||{}).value||"\u672a\u77e5";
    var pv=document.getElementById("province").value||"\u5317\u4eac";
    var mbtiCode=getSelectedMbtiCode();
    var per;
    if(mbtiCode){
      var found=pd.filter(function(p){return p.code===mbtiCode;});
      per=found.length>0?found[0]:getPersonality(s,sc,its,s2,ge,pv);
    }else{per=getPersonality(s,sc,its,s2,ge,pv);}
    var cl={I:"purple",E:"blue",S:"teal",N:"pink",T:"purple",F:"pink",J:"teal",P:"blue"};
    var lb={I:"\u5185\u5411",E:"\u5916\u5411",S:"\u5b9e\u611f",N:"\u76f4\u89c9",T:"\u7406\u6027",F:"\u611f\u6027",J:"\u8ba1\u5212",P:"\u7075\u6d3b"};
    var dims=Object.keys(per.score);
    var sb=dims.map(function(k){
      var v=per.score[k];
      return "<div class=\"per-score-item\"><span class=\"per-score-label\">"+lb[k]+"</span><div class=\"per-score-track\"><div class=\"per-score-fill "+cl[k]+"\" style=\"width:"+v+"%\"></div></div><span class=\"per-score-val\">"+v+"%</span></div>";
    }).join("");
    var html="<div class=\"per-type\"><div class=\"per-type-code\">"+per.code+"</div><div class=\"per-type-name\">"+per.name+"</div></div>"+
      "<div style=\"display:flex;gap:4px;justify-content:center;margin-bottom:12px\">"+per.dims.split(",").map(function(d){return "<span class=\"per-trait\" style=\"font-size:.68rem;padding:2px 8px\">"+d+"</span>";}).join("")+"</div>"+
      "<div class=\"per-traits\">"+per.traits.map(function(t){return "<span class=\"per-trait\">"+t+"</span>";}).join("")+"</div>"+
      "<div class=\"per-section-title\">\u2726 \u63a8\u8350\u804c\u4e1a</div>"+
      "<div class=\"per-careers\">"+per.careers.map(function(c){return "<span class=\"per-career\">"+c+"</span>";}).join("")+"</div>"+
      "<div class=\"per-section-title\" style=\"margin-top:12px\">\u2726 \u63a8\u8350\u4e13\u4e1a</div>"+
      "<div class=\"per-majors\">"+(per.majors||[]).map(function(m){return "<span class=\"per-major\">"+m+"</span>";}).join("")+"</div>"+
      "<div class=\"per-section-title\">\u2726 MBTI \u7ef4\u5ea6</div>"+
      "<div class=\"per-score-bar\">"+sb+"</div>"+
      "<div class=\"per-section-title\">\u2726 \u4e2a\u6027\u8bc4\u4ef7</div>"+
      "<div class=\"per-desc\">"+per.desc+"</div>"+
      "<div class=\"per-section-title\" style=\"margin-top:12px\">\u2726 \u5b66\u4e60\u5efa\u8bae</div>"+
      "<div class=\"per-desc\" style=\"color:#b0d8f0\">"+per.study+"</div>";
    document.getElementById("perContent").innerHTML=html;
    renderZodiac();
  };
})();

// 根据出生日期计算星座
function getZodiac(dateStr) {
  if (!dateStr) return null;
  var parts = dateStr.split('-');
  if (parts.length !== 3) return null;
  var month = parseInt(parts[1]), day = parseInt(parts[2]);
  var md = month * 100 + day;
  if (md >= 120 && md <= 218) return ZODIAC_DATA[0];  // 水瓶
  if (md >= 219 && md <= 320) return ZODIAC_DATA[1];  // 双鱼
  if (md >= 321 && md <= 419) return ZODIAC_DATA[2];  // 白羊
  if (md >= 420 && md <= 520) return ZODIAC_DATA[3];  // 金牛
  if (md >= 521 && md <= 621) return ZODIAC_DATA[4];  // 双子
  if (md >= 622 && md <= 722) return ZODIAC_DATA[5];  // 巨蟹
  if (md >= 723 && md <= 822) return ZODIAC_DATA[6];  // 狮子
  if (md >= 823 && md <= 922) return ZODIAC_DATA[7];  // 处女
  if (md >= 923 && md <= 1023) return ZODIAC_DATA[8]; // 天秤
  if (md >= 1024 && md <= 1122) return ZODIAC_DATA[9]; // 天蝎
  if (md >= 1123 && md <= 1221) return ZODIAC_DATA[10]; // 射手
  return ZODIAC_DATA[11]; // 摩羯 (12/22-1/19)
}

// 渲染星座分析
function renderZodiac() {
  var bd = document.getElementById('birthday').value;
  var z = getZodiac(bd);
  if (!z) {
    document.getElementById('zodiacContent').innerHTML = '<div style="text-align:center;padding:20px 0;color:#b0a0c8;font-size:.82rem;font-weight:500">请在上方填写出生日期</div>';
    return;
  }
  var html = '<div class="zodiac-header"><span class="zodiac-symbol">' + z.symbol + '</span><div class="zodiac-info"><div class="zodiac-name">' + z.name + '</div><div class="zodiac-sub">' + z.date + ' · ' + z.element + '象 · ' + z.planet + '</div></div></div>' +
    '<div class="per-section-title">✦ 性格特征</div>' +
    '<div class="zodiac-traits">' + z.traits.map(function(t){return '<span class="per-trait">' + t + '</span>';}).join('') + '</div>' +
    '<div class="zodiac-desc">' + z.desc + '</div>' +
    '<div class="per-section-title" style="margin-top:12px">✦ 匹配MBTI</div>' +
    '<div class="zodiac-mbti">' + z.mbti.map(function(m){return '<span class="zodiac-mbti-item">' + m + '</span>';}).join('') + '</div>' +
    '<div class="per-section-title" style="margin-top:12px">✦ 推荐专业 TOP5</div>' +
    '<div class="zodiac-majors">' + z.majors.map(function(m){return '<span class="per-career">' + m + '</span>';}).join('') + '</div>' +
    '<div class="per-section-title" style="margin-top:12px">✦ 学习建议</div>' +
    '<div class="zodiac-desc" style="color:#b0d8f0">' + z.study + '</div>' +
    '<div class="per-section-title" style="margin-top:12px">✦ 名人榜样</div>' +
    '<div class="zodiac-famous">' + z.famous.map(function(f){return '<span class="zodiac-famous-item">✦ ' + f + '</span>';}).join('') + '</div>';
  document.getElementById('zodiacContent').innerHTML = html;
}


// 切换性格分析标签
window.switchPerTab = function(tab) {
  document.querySelectorAll('.per-tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.per-tab-content').forEach(function(c){c.style.display='none';});
  document.querySelector('.per-tab[data-tab="'+tab+'"]').classList.add('active');
  document.getElementById(tab==='mbti'?'perContent':'zodiacContent').style.display='block';
  if(tab==='zodiac') renderZodiac();
};
// === 星座和MBTI联动 ===
function getZodiacMbtiMatch(mbtiCode, zodiac) {
  if (!mbtiCode || !zodiac) return null;
  var match = zodiac.mbti.indexOf(mbtiCode) >= 0;
  if (match) return {level:"high",text:"高度匹配 ⭐⭐⭐",desc:"你的MBTI类型与星座特质高度吻合，你是一个典型的" + zodiac.name + "型" + mbtiCode + "人格"};
  return {level:"low",text:"一般匹配 ⭐",desc:mbtiCode + "与" + zodiac.name + "的特质有一定差异，但这正是你性格多样性的体现"};
}

// === 各专业未来规划 Functions ===
window.openPlanModal = function(){
  var m = document.getElementById('planModal');
  if(m) { m.classList.add('open'); document.body.style.overflow = 'hidden'; }
  if(!document.getElementById('planGrid').children.length) renderMajorGrid();
};
window.closePlanModal = function(){
  var m = document.getElementById('planModal');
  if(m) { m.classList.remove('open'); document.body.style.overflow = ''; }
};
window.renderMajorGrid = function(){
  var grid = document.getElementById('planGrid');
  if(!grid || !window.MAJOR_NAMES) return;
  grid.innerHTML = '';
  MAJOR_NAMES.forEach(function(name){
    var btn = document.createElement('button');
    btn.className = 'plan-major-btn';
    btn.textContent = name;
    btn.setAttribute('data-major', name);
    btn.onclick = function(){ showMajorDetail(name); };
    grid.appendChild(btn);
  });
};
window.filterMajors = function(){
  var q = (document.getElementById('planSearch').value || '').trim();
  var btns = document.querySelectorAll('#planGrid .plan-major-btn');
  btns.forEach(function(b){
    b.style.display = (!q || b.textContent.indexOf(q) >= 0) ? '' : 'none';
  });
};
window.showMajorDetail = function(name){
  var data = MAJOR_DATA ? MAJOR_DATA[name] : null;
  if(!data) return;
  document.querySelectorAll('#planGrid .plan-major-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-major') === name);
  });
  var panel = document.getElementById('planDetailPanel');
  var inner = document.getElementById('planDetailInner');
  if(!inner) return;
  var career = data.career || '暂无数据';
  var study = data.study || '暂无数据';
  var advice = data.advice || '暂无数据';
  inner.innerHTML = '<div class="plan-detail-title">✦ <span>' + name + '</span></div>' +
    '<div class="plan-detail-section"><h3>毕业就业方向</h3><p>' + career + '</p></div>' +
    '<div class="plan-detail-section"><h3>学习内容与要求</h3><p>' + study + '</p></div>' +
    '<div class="plan-detail-section"><h3>学长学姐建议</h3><p>' + advice + '</p></div>';
  panel.classList.add('open');
  setTimeout(function(){ if(panel) panel.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 100);
};

</script>

  </div>
  <div class="plan-grid-wrap">
    <div class="plan-grid" id="planGrid"></div>
  </div>
  <div class="plan-detail-panel" id="planDetailPanel">

  </div>
</div>
